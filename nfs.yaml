# manifest
apiVersion: v1
kind: Namespace
metadata:
  name: sbdemo-nfs
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sbdemo-nfs-server-pvc
  namespace: sbdemo-nfs
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: gp2
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sbdemo-nfs-server
  namespace: sbdemo-nfs
spec:
  replicas: 1
  selector:
    matchLabels:
      role: nfs-server
  template:
    metadata:
      labels:
        role: nfs-server
    spec:
      containers:
      - name: nfs-server
        image: k8s.gcr.io/volume-nfs:0.8
        ports:
          - name: nfs
            containerPort: 2049
          - name: mountd
            containerPort: 20048
          - name: rpcbind
            containerPort: 111
        securityContext:
          privileged: true
        volumeMounts:
        - mountPath: /exports
          name: sbdemo-nfs-server-pvc
      volumes:
        - name: sbdemo-nfs-server-pvc
          persistentVolumeClaim:
            claimName: sbdemo-nfs-server-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: sbdemo-nfs-server-service
  namespace: sbdemo-nfs
spec:
  ports:
  - name: nfs
    port: 2049
  - name: mountd
    port: 20048
  - name: rpcbind
    port: 111
  selector:
    role: nfs-server

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: sbdemo-nfs-pv
  labels:
    role: nfs-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  nfs:
    server: "172.20.239.138"
    path: "/"